services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: persontrace
      POSTGRES_PASSWORD: persontrace
      POSTGRES_DB: persontrace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    command: server -s3 -s3.port=8333 -dir=/data -master.volumeSizeLimitMB=1024
    ports:
      - "8333:8333"
    volumes:
      - seaweed:/data

volumes:
  pgdata:
  seaweed:
